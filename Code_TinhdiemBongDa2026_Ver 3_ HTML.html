<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VT Healthcare - Kickoff 2026 League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .theme-color { color: #15a48f; }
        .theme-bg { background-color: #15a48f; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="app"></div>

    <script>
        // --- CẤU HÌNH & STATE ---
        const THEME_COLOR = '#15a48f';
        let step = 'setup'; 
        let activeTab = 'mens'; 

        // Tên đội mặc định theo nội dung mới
        const DEFAULT_TEAM_NAMES = [
            "Data Driven + Key Objectives",    // Team 1 - D
            "Uplifting Service + Automation", // Team 2 - A
            "Ownership + Leadership",         // Team 3 - C
            "Hybrid Competence + Touchpoints" // Team 4 - B
        ];

        // Mảng mapping để dễ quản lý ID theo logic cũ (A, B, C, D)
        // m1=D, m2=A, m3=C, m4=B
        
        // Bóng đá Nam (Vòng tròn)
        let mensTeams = [
            { id: 'mD', name: DEFAULT_TEAM_NAMES[0], short: 'D' },
            { id: 'mA', name: DEFAULT_TEAM_NAMES[1], short: 'A' },
            { id: 'mC', name: DEFAULT_TEAM_NAMES[2], short: 'C' },
            { id: 'mB', name: DEFAULT_TEAM_NAMES[3], short: 'B' }
        ];
        let mensMatches = [];
        let mensPenalties = {};

        // Bóng đá Nữ (Loại trực tiếp)
        let womensTeams = [
            { id: 'wD', name: DEFAULT_TEAM_NAMES[0], short: 'D' },
            { id: 'wA', name: DEFAULT_TEAM_NAMES[1], short: 'A' },
            { id: 'wC', name: DEFAULT_TEAM_NAMES[2], short: 'C' },
            { id: 'wB', name: DEFAULT_TEAM_NAMES[3], short: 'B' }
        ];
        let womensMatches = [];

        // --- LOGIC TÍNH TOÁN BÓNG ĐÁ NAM (VÒNG TRÒN) ---
        function calculateMensStandings() {
            let stats = {};
            mensTeams.forEach(t => {
                stats[t.id] = { ...t, played: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, gd: 0, pts: 0, sortBonus: 0 };
            });

            let playedCount = 0;
            mensMatches.forEach(m => {
                if (m.score1 !== null && m.score2 !== null) {
                    playedCount++;
                    const t1 = stats[m.team1];
                    const t2 = stats[m.team2];
                    t1.played += 1; t2.played += 1;
                    t1.gf += m.score1; t1.ga += m.score2;
                    t2.gf += m.score2; t2.ga += m.score1;
                    if (m.score1 > m.score2) { t1.w += 1; t2.l += 1; t1.pts += 3; }
                    else if (m.score1 < m.score2) { t2.w += 1; t1.l += 1; t2.pts += 3; }
                    else { t1.d += 1; t2.d += 1; t1.pts += 1; t2.pts += 1; }
                }
            });

            Object.values(stats).forEach(t => t.gd = t.gf - t.ga);

            let sorted = Object.values(stats).sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            const isAllPlayed = playedCount === 6;
            let ties = [];
            if (isAllPlayed) {
                for (let i = 0; i < sorted.length - 1; i++) {
                    const a = sorted[i], b = sorted[i+1];
                    if (a.pts === b.pts && a.gd === b.gd && a.gf === b.gf) {
                        const tieId = `tie_${a.id}_${b.id}`;
                        ties.push({ id: tieId, team1: a, team2: b });
                        const penScores = mensPenalties[tieId];
                        if (penScores) {
                            const penA = penScores[a.id] || 0, penB = penScores[b.id] || 0;
                            a.sortBonus += (penA > penB ? 0.01 : (penA < penB ? -0.01 : 0));
                            b.sortBonus += (penB > penA ? 0.01 : (penB < penA ? -0.01 : 0));
                        }
                    }
                }
                sorted = sorted.sort((a, b) => {
                    const sA = a.pts + (a.sortBonus || 0), sB = b.pts + (b.sortBonus || 0);
                    if (sB !== sA) return sB - sA;
                    if (b.gd !== a.gd) return b.gd - a.gd;
                    return b.gf - a.gf;
                });
            }
            return { standings: sorted, tieBreakers: ties, allMatchesPlayed: isAllPlayed };
        }

        // --- LOGIC CẬP NHẬT TRẬN ĐẤU NỮ (KNOCKOUT) ---
        function updateWomensKnockout() {
            const bk1 = womensMatches.find(m => m.id === 'w_bk1');
            const bk2 = womensMatches.find(m => m.id === 'w_bk2');
            const h3 = womensMatches.find(m => m.id === 'w_h3');
            const ck = womensMatches.find(m => m.id === 'w_ck');

            if (bk1.score1 !== null && bk1.score2 !== null) {
                if (bk1.score1 > bk1.score2) {
                    ck.team1 = bk1.team1; h3.team1 = bk1.team2;
                } else if (bk1.score1 < bk1.score2) {
                    ck.team1 = bk1.team2; h3.team1 = bk1.team1;
                }
            }
            if (bk2.score1 !== null && bk2.score2 !== null) {
                if (bk2.score1 > bk2.score2) {
                    ck.team2 = bk2.team1; h3.team2 = bk2.team2;
                } else if (bk2.score1 < bk2.score2) {
                    ck.team2 = bk2.team2; h3.team2 = bk2.team1;
                }
            }
        }

        // --- HÀNH ĐỘNG ---
        function startTournament() {
            // Lịch Nam: Vòng tròn
            mensMatches = [
                { id: `m_1`, round: 1, team1: `mD`, team2: `mA`, score1: null, score2: null, time: '14:00' },
                { id: `m_2`, round: 1, team1: `mC`, team2: `mB`, score1: null, score2: null, time: '14:00' },
                { id: `m_3`, round: 2, team1: `mD`, team2: `mC`, score1: null, score2: null, time: '15:00' },
                { id: `m_4`, round: 2, team1: `mA`, team2: `mB`, score1: null, score2: null, time: '15:00' },
                { id: `m_5`, round: 3, team1: `mD`, team2: `mB`, score1: null, score2: null, time: '16:00' },
                { id: `m_6`, round: 3, team1: `mA`, team2: `mC`, score1: null, score2: null, time: '16:00' },
            ];

            // Lịch Nữ: D-A và C-B
            womensMatches = [
                { id: 'w_bk1', label: 'Bán kết 1', team1: 'wD', team2: 'wA', score1: null, score2: null, type: 'bk' },
                { id: 'w_bk2', label: 'Bán kết 2', team1: 'wC', team2: 'wB', score1: null, score2: null, type: 'bk' },
                { id: 'w_h3', label: 'Tranh Hạng 3', team1: null, team2: null, score1: null, score2: null, type: 'final' },
                { id: 'w_ck', label: 'Chung kết', team1: null, team2: null, score1: null, score2: null, type: 'final' }
            ];

            step = 'tournament';
            render();
        }

        function updateScore(gender, matchId, teamIdx, delta) {
            const matches = gender === 'mens' ? mensMatches : womensMatches;
            const match = matches.find(m => m.id === matchId);
            if (match) {
                if (teamIdx === 1) match.score1 = Math.max(0, (match.score1 ?? 0) + delta);
                else match.score2 = Math.max(0, (match.score2 ?? 0) + delta);
                if (gender === 'womens') updateWomensKnockout();
            }
            render();
        }

        function switchTab(tab) { activeTab = tab; render(); }

        // --- TEMPLATES ---
        const LogoVT = () => `
            <div class="flex items-center space-x-3">
                <div class="bg-white p-2 rounded-xl shadow-sm">
                    <svg width="40" height="40" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 35 C20 20, 30 15, 45 15 L80 15 C85 15, 85 20, 85 25 L85 45 C85 45, 60 45, 60 45 C50 45, 45 50, 45 60 L45 85 C45 85, 25 85, 20 80 C15 75, 15 65, 15 50 L15 35 Z" fill="${THEME_COLOR}"/>
                        <path d="M60 55 C60 50, 65 45, 75 45 L85 45 L85 80 C85 90, 75 95, 60 95 L25 95 C20 95, 20 90, 20 85 L45 85 C55 85, 60 80, 60 70 L60 55 Z" fill="${THEME_COLOR}"/>
                    </svg>
                </div>
                <div class="flex flex-col text-left">
                    <span class="text-2xl font-black italic tracking-tight" style="color: ${THEME_COLOR}">VT healthcare</span>
                    <span class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Kickoff 2026 • League</span>
                </div>
            </div>
        `;

        function renderSetup() {
            return `
                <div class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6">
                    ${LogoVT()}
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-4xl border border-slate-100 mt-10">
                        <h2 class="text-3xl font-black text-center text-slate-800 mb-10 uppercase tracking-tight italic">Xác nhận danh sách đội</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div class="space-y-4">
                                <div class="flex items-center space-x-2 text-blue-600 font-black uppercase text-xs border-b pb-3 tracking-widest">
                                    <i class="fas fa-mars"></i> <span>Bảng Nam (Vòng tròn)</span>
                                </div>
                                ${mensTeams.map((t, i) => `
                                    <div class="flex items-center space-x-2">
                                        <span class="text-slate-300 font-black w-6 text-center">${t.short}</span>
                                        <input type="text" class="flex-1 px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 font-bold text-slate-700"
                                            value="${t.name}" oninput="mensTeams[${i}].name = this.value">
                                    </div>
                                `).join('')}
                            </div>
                            <div class="space-y-4">
                                <div class="flex items-center space-x-2 text-pink-600 font-black uppercase text-xs border-b pb-3 tracking-widest">
                                    <i class="fas fa-venus"></i> <span>Bảng Nữ (Trực tiếp)</span>
                                </div>
                                ${womensTeams.map((t, i) => `
                                    <div class="flex items-center space-x-2">
                                        <span class="text-slate-300 font-black w-6 text-center">${t.short}</span>
                                        <input type="text" class="flex-1 px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-teal-500 font-bold text-slate-700"
                                            value="${t.name}" oninput="womensTeams[${i}].name = this.value">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <button onclick="startTournament()" class="w-full mt-12 text-white font-black text-xl py-6 rounded-[2rem] shadow-xl hover:-translate-y-1 active:translate-y-0 transition-all uppercase tracking-[0.2em] theme-bg">
                            Bắt đầu GIẢI ĐẤU
                        </button>
                    </div>
                </div>
            `;
        }

        function renderMatchCard(m, gender, teams) {
            const t1Obj = teams.find(t => t.id === m.team1);
            const t2Obj = teams.find(t => t.id === m.team2);
            return `
                <div class="bg-slate-50 p-6 rounded-3xl border border-transparent hover:border-teal-100 hover:bg-white hover:shadow-lg transition-all">
                    <div class="text-[10px] font-black text-slate-400 mb-4 text-center uppercase tracking-widest">${m.label || m.time}</div>
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex-1 flex flex-col items-center">
                            <span class="text-[11px] font-black text-slate-700 text-center mb-3 h-10 flex items-center leading-tight uppercase tracking-tight">${t1Obj ? t1Obj.name : 'Chưa xác định'}</span>
                            <div class="flex items-center bg-white rounded-2xl border-2 border-slate-100 shadow-inner p-1">
                                <button onclick="updateScore('${gender}', '${m.id}', 1, -1)" class="p-2 text-slate-300 hover:text-red-500"><i class="fas fa-minus text-xs"></i></button>
                                <span class="w-12 text-center font-black text-3xl ${m.score1 !== null ? 'text-teal-600' : 'text-slate-200'}">${m.score1 ?? '-'}</span>
                                <button onclick="updateScore('${gender}', '${m.id}', 1, 1)" class="p-2 text-slate-300 hover:text-teal-500"><i class="fas fa-plus text-xs"></i></button>
                            </div>
                        </div>
                        <div class="px-2 opacity-30 font-black italic text-xl">VS</div>
                        <div class="flex-1 flex flex-col items-center">
                            <span class="text-[11px] font-black text-slate-700 text-center mb-3 h-10 flex items-center leading-tight uppercase tracking-tight">${t2Obj ? t2Obj.name : 'Chưa xác định'}</span>
                            <div class="flex items-center bg-white rounded-2xl border-2 border-slate-100 shadow-inner p-1">
                                <button onclick="updateScore('${gender}', '${m.id}', 2, -1)" class="p-2 text-slate-300 hover:text-red-500"><i class="fas fa-minus text-xs"></i></button>
                                <span class="w-12 text-center font-black text-3xl ${m.score2 !== null ? 'text-teal-600' : 'text-slate-200'}">${m.score2 ?? '-'}</span>
                                <button onclick="updateScore('${gender}', '${m.id}', 2, 1)" class="p-2 text-slate-300 hover:text-teal-500"><i class="fas fa-plus text-xs"></i></button>
                            </div>
                        </div>
                    </div>
                    ${gender === 'womens' && m.score1 !== null && m.score1 === m.score2 ? `<div class="mt-4 text-center text-[9px] font-bold text-orange-500 italic uppercase">Cần nhập tổng điểm bao gồm Penalty</div>` : ''}
                </div>
            `;
        }

        function renderTournament() {
            return `
                <div class="min-h-screen bg-slate-100 pb-20">
                    <div class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b">
                        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                            ${LogoVT()}
                            <div class="text-[10px] font-black text-slate-400 bg-slate-100 px-3 py-1.5 rounded-full uppercase tracking-widest">KICKOFF 2026 OFFICIAL</div>
                        </div>
                        <div class="max-w-6xl mx-auto flex px-6">
                            <button onclick="switchTab('mens')" class="flex-1 py-4 text-xs font-black transition-all border-b-4 ${activeTab === 'mens' ? 'text-blue-600 border-blue-600' : 'text-slate-300 border-transparent hover:text-slate-500 uppercase'}">BÓNG ĐÁ NAM</button>
                            <button onclick="switchTab('womens')" class="flex-1 py-4 text-xs font-black transition-all border-b-4 ${activeTab === 'womens' ? 'text-pink-600 border-pink-600' : 'text-slate-300 border-transparent hover:text-slate-500 uppercase'}">BÓNG ĐÁ NỮ</button>
                        </div>
                    </div>
                    <main class="max-w-6xl mx-auto p-6">
                        ${activeTab === 'mens' ? renderMensContent() : renderWomensContent()}
                    </main>
                </div>
            `;
        }

        function renderMensContent() {
            const stats = calculateMensStandings();
            return `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    <div class="lg:col-span-7 space-y-8">
                        <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-white">
                            <h2 class="text-2xl font-black mb-10 uppercase italic text-slate-800 tracking-tight">Lịch thi đấu Nam</h2>
                            <div class="space-y-12">
                                ${[1, 2, 3].map(round => `
                                    <div class="relative pl-8 border-l-2 border-slate-100 ml-2">
                                        <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-teal-500"></div>
                                        <div class="text-xs font-black text-teal-600 uppercase mb-6">Vòng ${round}</div>
                                        <div class="grid grid-cols-1 gap-6">
                                            ${mensMatches.filter(m => m.round === round).map(m => renderMatchCard(m, 'mens', mensTeams)).join('')}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-5 space-y-8">
                        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-white overflow-hidden">
                            <div class="p-7 text-white font-black flex items-center justify-between bg-blue-600 uppercase">Bảng xếp hạng Nam</div>
                            <table class="w-full text-[10px]">
                                <tr class="bg-slate-50 text-slate-400 font-black uppercase border-b">
                                    <th class="px-3 py-6 w-12 text-center">Hạng</th>
                                    <th class="px-2 py-6 text-left">Đội</th>
                                    <th class="px-2 py-6 w-14 text-center">BT/HS</th>
                                    <th class="px-4 py-6 text-slate-800 w-14 text-center">ĐIỂM</th>
                                </tr>
                                ${stats.standings.map((team, idx) => `
                                    <tr class="border-b ${idx === 0 ? 'bg-yellow-50/40' : ''}">
                                        <td class="px-3 py-6 text-center font-black">${idx + 1}</td>
                                        <td class="px-2 py-6 font-black uppercase text-slate-800 leading-tight">
                                            <div class="text-[11px]">${team.name}</div>
                                            <div class="text-[8px] opacity-30 mt-0.5">Team ${team.short}</div>
                                        </td>
                                        <td class="px-2 py-6 text-center font-bold text-slate-600">${team.gf}/${team.gd}</td>
                                        <td class="px-4 py-6 text-center font-black text-lg">${team.pts}</td>
                                    </tr>
                                `).join('')}
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderWomensContent() {
            const bkMatches = womensMatches.filter(m => m.type === 'bk');
            return `
                <div class="space-y-10">
                    <div class="bg-white rounded-[2.5rem] shadow-xl p-8 border border-white">
                        <h2 class="text-2xl font-black uppercase italic text-slate-800 mb-10 tracking-tight">Vòng Bán Kết</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            ${bkMatches.map(m => renderMatchCard(m, 'womens', womensTeams)).join('')}
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-gradient-to-br from-pink-500 to-rose-600 rounded-[2.5rem] shadow-xl p-8 text-white">
                            <h2 class="text-2xl font-black uppercase italic mb-8">Chung Kết</h2>
                            ${renderMatchCard(womensMatches.find(m => m.id === 'w_ck'), 'womens', womensTeams)}
                        </div>
                        <div class="bg-slate-800 rounded-[2.5rem] shadow-xl p-8 text-white">
                            <h2 class="text-2xl font-black uppercase italic mb-8">Tranh Hạng 3</h2>
                            ${renderMatchCard(womensMatches.find(m => m.id === 'w_h3'), 'womens', womensTeams)}
                        </div>
                    </div>
                    <div class="bg-white rounded-[2.5rem] shadow-lg p-8">
                        <h2 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-6 italic">Kết quả chung cuộc Nữ</h2>
                        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                            ${getFinalWomensRank().map((r, i) => `
                                <div class="p-5 rounded-3xl bg-slate-50 border border-slate-100 flex flex-col items-center">
                                    <div class="text-[10px] font-black text-slate-400 uppercase mb-2">Hạng ${i+1}</div>
                                    <div class="font-black text-slate-800 text-center uppercase text-[10px] leading-tight">${r ? r.name : '---'}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function getFinalWomensRank() {
            const ck = womensMatches.find(m => m.id === 'w_ck');
            const h3 = womensMatches.find(m => m.id === 'w_h3');
            let ranks = [null, null, null, null];
            if (ck.score1 !== null && ck.score2 !== null) {
                ranks[0] = womensTeams.find(t => t.id === (ck.score1 > ck.score2 ? ck.team1 : ck.team2));
                ranks[1] = womensTeams.find(t => t.id === (ck.score1 > ck.score2 ? ck.team2 : ck.team1));
            }
            if (h3.score1 !== null && h3.score2 !== null) {
                ranks[2] = womensTeams.find(t => t.id === (h3.score1 > h3.score2 ? h3.team1 : h3.team2));
                ranks[3] = womensTeams.find(t => t.id === (h3.score1 > h3.score2 ? h3.team2 : h3.team1));
            }
            return ranks;
        }

        function render() {
            const root = document.getElementById('app');
            root.innerHTML = step === 'setup' ? renderSetup() : renderTournament();
        }
        render();
    </script>
</body>
</html>
